name: Browser Extension Release

on:
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Publish Extensions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'extension/package-lock.json'

      - name: Install Dependencies
        working-directory: extension
        run: npm ci

      # --- CHROME ---
      - name: Build Chrome Extension
        working-directory: extension
        run: |
          npm run build:chrome
          cd dist
          zip -r ../chrome-extension.zip ./*

      # --- FIREFOX ---
      - name: Build Firefox Extension
        working-directory: extension
        run: |
          # Clean dist before rebuilding
          rm -rf dist
          npm run build:firefox
          cd dist
          zip -r ../firefox-extension.zip ./*

      # --- OPERA ---
      - name: Build Opera Extension
        working-directory: extension
        run: |
          rm -rf dist
          npm run build:opera
          cd dist
          zip -r ../opera-extension.zip ./*

      # --- UPLOAD TO GITHUB RELEASES ---
      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            extension/chrome-extension.zip
            extension/firefox-extension.zip
            extension/opera-extension.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- PUBLISH TO CHROME WEB STORE ---
      # This step only runs if you have added the Chrome secrets to your GitHub repository
      - name: Publish to Chrome Web Store
        if: env.CHROME_CLIENT_ID != ''
        working-directory: extension
        run: |
          npx chrome-webstore-upload-cli@3 \
            --source chrome-extension.zip \
            --extension-id ${{ secrets.CHROME_EXTENSION_ID }} \
            --client-id ${{ secrets.CHROME_CLIENT_ID }} \
            --client-secret ${{ secrets.CHROME_CLIENT_SECRET }} \
            --refresh-token ${{ secrets.CHROME_REFRESH_TOKEN }} \
            --auto-publish
        env:
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}

      # --- PUBLISH TO FIREFOX ADD-ONS (AMO) ---
      # This step only runs if you have added the Firefox secrets
      - name: Publish to Firefox AMO
        if: env.FIREFOX_JWT_ISSUER != ''
        working-directory: extension
        run: |
          npx web-ext sign \
            --source-dir ./dist \
            --channel listed \
            --api-key ${{ secrets.FIREFOX_JWT_ISSUER }} \
            --api-secret ${{ secrets.FIREFOX_JWT_SECRET }}
        env:
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
